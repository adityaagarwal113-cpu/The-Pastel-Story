<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>The Pastel Story - Handcrafted Pastel Fashion & Boutique Silhouettes</title>
    <meta name="title" content="The Pastel Story - Handcrafted Pastel Fashion & Boutique Silhouettes" />
    <meta name="description" content="Discover handpicked pastel silhouettes, feminine aesthetics, and boutique fashion. Shop curated collections of kurtas, co-ord sets, dresses, and suit sets crafted with love. Free shipping on orders above ₹999." />
    <meta name="keywords" content="pastel fashion, boutique clothing, handmade kurtas, co-ord sets, feminine dresses, Indian ethnic wear, handcrafted clothing, sustainable fashion, pastel story, women's fashion" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="The Pastel Story by Shiwani" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://thepastelstory.com/" />
    <meta property="og:title" content="The Pastel Story - Handcrafted Pastel Fashion & Boutique Silhouettes" />
    <meta property="og:description" content="Discover handpicked pastel silhouettes, feminine aesthetics, and boutique fashion. Shop curated collections crafted with love." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1596755094514-f87e34085b2c?w=1200" />
    <meta property="og:site_name" content="The Pastel Story" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://thepastelstory.com/" />
    <meta property="twitter:title" content="The Pastel Story - Handcrafted Pastel Fashion" />
    <meta property="twitter:description" content="Discover handpicked pastel silhouettes and boutique fashion crafted with love." />
    <meta property="twitter:image" content="https://images.unsplash.com/photo-1596755094514-f87e34085b2c?w=1200" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://thepastelstory.com/" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Structured Data - Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "The Pastel Story",
      "url": "https://thepastelstory.com",
      "logo": "https://images.unsplash.com/photo-1596755094514-f87e34085b2c?w=200",
      "description": "Boutique fashion brand specializing in handcrafted pastel silhouettes and feminine aesthetics",
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+91-8444929090",
        "contactType": "customer service"
      },
      "sameAs": [
        "https://www.instagram.com/pastelstory_by_shiwani"
      ]
    }
    </script>

    <!-- Structured Data - Website -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "The Pastel Story",
      "url": "https://thepastelstory.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://thepastelstory.com/shop?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
