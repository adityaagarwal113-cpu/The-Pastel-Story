<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Core SEO Meta Tags -->
    <title>The Pastel Story | Buy Premium Co-ord Sets, Designer Kurtas & Premium Loungewear</title>
    <meta name="description" content="Discover The Pastel Story: a luxury e-commerce clothing boutique featuring handpicked, breathable pastel silhouettes, elegant co-ord sets, contemporary designer kurtas, chiffon suit sets, and premium feminine comfort loungewear with worldwide shipping." />
    <meta name="keywords" content="pastel story, co-ord sets, premium kurtas, pastel loungewear, designer suits, luxury cotton coord sets, ethnic outfits, modern fusion wear, feminine aesthetics, premium women boutique" />
    <meta name="author" content="The Pastel Story" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <link rel="canonical" href="https://thepastelstory.com" />
    
    <!-- Google Fonts Preconnect (Performance Enhancement for SEO Speed Factors) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Open Graph / Facebook / WhatsApp Social Previews -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="The Pastel Story | Premium Co-ord Sets, Kurtas & Loungewear" />
    <meta property="og:description" content="Handpicked premium pastel clothing silhouettes, breathable elegant co-ords, luxury kurta sets, and designer outfits crafted for soft comfort." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1583391733956-3750e0ff4e8b?w=1200&q=80" />
    <meta property="og:url" content="https://thepastelstory.com" />
    <meta property="og:site_name" content="The Pastel Story" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card App Analytics Previews -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="The Pastel Story | Premium Loungewear & Designer Co-ord Sets" />
    <meta name="twitter:description" content="Discover handpicked pastel clothing silhouettes, highly breathable elegant co-ords, and luxury suit sets designed for contemporary style." />
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1583391733956-3750e0ff4e8b?w=1200&q=80" />

    <!-- Asset and Cloudinary Integration scripts -->
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>

    <!-- Structured JSON-LD Data for Google Search Rich Snippets & Shopping Index -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "OnlineStore",
            "@id": "https://thepastelstory.com/#organization",
            "name": "The Pastel Story",
            "url": "https://thepastelstory.com",
            "logo": "https://images.unsplash.com/photo-1583391733956-3750e0ff4e8b?w=300&q=80",
            "description": "An elegant e-commerce boutique featuring handpicked pastel silhouettes and feminine aesthetics.",
            "priceRange": "$$",
            "currenciesAccepted": "INR, USD",
            "address": {
              "@type": "PostalAddress",
              "addressCountry": "IN"
            }
          },
          {
            "@type": "WebSite",
            "@id": "https://thepastelstory.com/#website",
            "url": "https://thepastelstory.com",
            "name": "The Pastel Story",
            "description": "Luxury premium coord sets, kurtas and elegant loungewear online",
            "publisher": {
              "@id": "https://thepastelstory.com/#organization"
            },
            "potentialAction": {
              "@type": "SearchAction",
              "target": {
                "@type": "EntryPoint",
                "urlTemplate": "https://thepastelstory.com/?view=shop&search={search_term_string}"
              },
              "query-input": "required name=search_term_string"
            }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
